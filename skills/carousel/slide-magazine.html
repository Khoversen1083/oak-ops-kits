<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{KEYWORD}} · {{SLIDE_INDEX}}/{{TOTAL_SLIDES}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --surface: #14141F;
    --surface-alt: #1B1B2A;
    --ink: #F0F0F5;
    --ink-soft: #A1A1B5;
    --ink-dim: #5E5E78;
    --rule: #2A2A3F;
    --accent: #6366F1;
    --accent-glow: #8B5CF6;
    --accent-dim: #3F3D9E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 64px 72px;
  }
  /* Subtle grid texture across all slides for cohesion */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(99,102,241,0.10) 0, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(139,92,246,0.08) 0, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .slide > * { position: relative; z-index: 1; }

  /* TOP META BAR (issue header) */
  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 18px;
    margin-bottom: 56px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .meta-bar .wordmark {
    color: var(--accent);
    font-weight: 700;
  }

  /* FOOTER (always at bottom) */
  .footer {
    margin-top: auto;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight: 500;
  }
  .footer .handle {
    color: var(--ink-soft);
    font-weight: 600;
  }
  .footer .swipe {
    color: var(--accent);
    font-weight: 700;
  }

  /* MAIN BODY (between meta and footer) */
  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* ---- SLOT: HOOK ---- */
  .hook .hook-headline {
    font-weight: 900;
    font-size: 124px;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: var(--ink);
  }
  .hook .hook-headline .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 800;
  }
  .hook .hook-sub {
    font-size: 28px;
    line-height: 1.35;
    color: var(--ink-soft);
    font-weight: 500;
    margin-top: 28px;
    max-width: 80%;
  }

  /* Diagonal stripe accent bleeding to right edge (continuous canvas: slide 1 -> 2) */
  .hook::after {
    content: '';
    position: absolute;
    right: -120px;
    top: 18%;
    width: 600px;
    height: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-glow));
    transform: rotate(-12deg);
    box-shadow: 0 0 40px rgba(99,102,241,0.4);
    z-index: 0;
  }

  /* ---- SLOT: STAKES ---- */
  .stakes .stakes-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 32px;
  }
  .stakes .stakes-headline {
    font-weight: 800;
    font-size: 92px;
    line-height: 1.04;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .stakes .stakes-headline .strike {
    color: var(--ink-soft);
    text-decoration: line-through;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 6px;
  }
  /* Continuous canvas finishing the stripe from slide 1 */
  .stakes::before {
    content: '';
    position: absolute;
    left: -120px;
    top: 18%;
    width: 600px;
    height: 8px;
    background: linear-gradient(270deg, var(--accent), var(--accent-glow));
    transform: rotate(-12deg);
    box-shadow: 0 0 40px rgba(99,102,241,0.4);
    z-index: 0;
  }

  /* ---- SLOT: SYSTEM ---- */
  .system .system-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 28px;
  }
  .system .system-name {
    font-weight: 900;
    font-size: 96px;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 36px;
  }
  .system .system-oneliner {
    font-size: 32px;
    line-height: 1.35;
    color: var(--ink-soft);
    font-weight: 500;
    margin-bottom: 56px;
    max-width: 88%;
  }
  .system .system-blocks {
    display: flex;
    gap: 18px;
    align-items: stretch;
    margin-top: 12px;
  }
  .system .block {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 16px;
    padding: 26px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    color: var(--ink);
    font-weight: 600;
    text-align: center;
    position: relative;
  }
  .system .block .pin {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .system .arrow {
    align-self: center;
    color: var(--accent);
    font-size: 28px;
    font-weight: 700;
  }

  /* ---- SLOT: STEP ---- */
  .step .step-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 48px;
  }
  .step .step-badge {
    background: var(--accent);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    padding: 14px 26px;
    border-radius: 12px;
    letter-spacing: 0.04em;
  }
  .step .step-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .step .step-title {
    font-weight: 900;
    font-size: 96px;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 40px;
  }
  .step .step-title .accent {
    color: var(--accent);
  }
  .step .step-body {
    font-size: 34px;
    line-height: 1.4;
    color: var(--ink-soft);
    font-weight: 500;
    max-width: 92%;
  }
  .step .step-body strong {
    color: var(--ink);
    font-weight: 700;
  }

  /* ---- SLOT: PAYOFF ---- */
  .payoff .payoff-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 28px;
  }
  .payoff .payoff-headline {
    font-weight: 900;
    font-size: 108px;
    line-height: 1.0;
    letter-spacing: -0.035em;
    color: var(--ink);
  }
  .payoff .payoff-headline .accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
  }

  /* ---- SLOT: CTA ---- */
  .cta .cta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 28px;
  }
  .cta .cta-comment {
    font-weight: 900;
    font-size: 84px;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 28px;
  }
  .cta .cta-keyword {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 12px 32px;
    border-radius: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 84px;
    margin: 24px 0 40px;
    letter-spacing: 0.02em;
  }
  .cta .cta-body {
    font-size: 30px;
    line-height: 1.4;
    color: var(--ink-soft);
    font-weight: 500;
    max-width: 88%;
    margin-bottom: 56px;
  }
  .cta .cta-handle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

</style>
</head>
<body>

<section class="slide {{SLOT_CLASS}}">
  <div class="meta-bar">
    <span class="wordmark">KEV·HOV.AI</span>
    <span>{{DATE}} · {{KEYWORD}}</span>
    <span>{{SLIDE_INDEX_PADDED}} / {{TOTAL_SLIDES_PADDED}}</span>
  </div>

  <div class="body">
    {{SLOT_BODY}}
  </div>

  <div class="footer">
    <span class="handle">@kevhov.ai</span>
    <span class="swipe">{{FOOTER_RIGHT}}</span>
  </div>
</section>

</body>
</html>
